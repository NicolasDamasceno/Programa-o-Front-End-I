<!--
A tag inicial de um elemento do body pode ser omitida se o elemento 
estiver vazio ou se a primeira coisa dentro do elemento do body não 
for um espaço em branco ASCII ou um comentário, exceto se a primeira 
coisa dentro do elemento do body for um elemento meta, noscript, link, script, estilo ou modelo. 
A tag final de um elemento do body pode ser omitida se o elemento do body não for imediatamente 
seguido por um comentário.-->
